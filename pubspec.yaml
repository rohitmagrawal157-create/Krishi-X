name: krishix
description: KrishiX - Trusted rural agriculture marketplace for Indian farmers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.3
  share_plus: ^7.2.2
  url_launcher: ^6.3.1
  photo_view: ^0.15.0
  carousel_slider: ^5.0.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#ffffff"  # white background
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  generate: true
